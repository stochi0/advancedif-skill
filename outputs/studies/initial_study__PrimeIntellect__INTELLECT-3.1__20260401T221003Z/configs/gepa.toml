initial_skill_markdown = ""

[gepa]
max_calls = 1
num_train = 1
num_val = 1
minibatch_size = 1
state_columns = ["criterion_vector", "judge_history", "first_submission_score"]

[execution]
max_concurrent = 32
seed = 7
sampling_args = { temperature = 0.2 }
